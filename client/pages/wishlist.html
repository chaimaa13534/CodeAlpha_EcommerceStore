<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" /><link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" /><link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" /><link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>
<header class="navbar"><div class="container navbar-inner">
  <a href="/" class="navbar-logo"><span class="logo-text">Shop<span class="logo-accent">Lux</span></span></a>
  <nav style="display:flex;align-items:center;gap:var(--spacing-4);margin-left:auto">
    <a href="/" class="btn btn-sm btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="/pages/cart.html" class="action-btn" style="position:relative"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartBadge" style="display:none">0</span></a>
    <button class="action-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </nav>
</div></header>

<main>
  <div class="container" style="padding-top:var(--spacing-10);padding-bottom:var(--spacing-16)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--spacing-8)">
      <h1 style="font-family:var(--font-display);font-size:var(--text-3xl)"><i class="fas fa-heart" style="color:var(--color-accent);margin-right:var(--spacing-3)"></i>My Wishlist</h1>
      <span id="wishCount" style="font-size:var(--text-sm);color:var(--text-muted)"></span>
    </div>
    <div class="wishlist-grid" id="wishlistGrid">
      <div style="text-align:center;padding:var(--spacing-10);grid-column:1/-1"><div class="spinner spinner-lg"></div></div>
    </div>
  </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const c = document.documentElement.getAttribute('data-theme');
    const n = c === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('sl_theme', n);
    document.querySelector('#themeToggle i').className = n === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });
  Auth.init();
  if (!Auth.requireAuth('/pages/wishlist.html')) return;
  await Cart.refresh();
  await loadWishlist();
});

async function loadWishlist() {
  const grid  = document.getElementById('wishlistGrid');
  const count = document.getElementById('wishCount');
  try {
    const res = await Api.wishlist.get();
    if (count) count.textContent = `${res.data.length} item${res.data.length !== 1 ? 's' : ''}`;
    if (!res.data.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-heart-broken fa-4x" style="color:var(--color-accent)"></i><h3>Your wishlist is empty</h3><p>Save products you love and come back to them later.</p><a href="/" class="btn btn-primary"><i class="fas fa-store"></i> Discover Products</a></div>`;
      return;
    }
    grid.innerHTML = res.data.map(item => `
      <div class="product-card animate-fade-in-up">
        <button class="product-card-wishlist active" onclick="removeFromWishlist(${item.id}, this)" title="Remove from Wishlist">
          <i class="fas fa-heart"></i>
        </button>
        <div class="product-card-img" onclick="window.location.href='/pages/product.html?id=${item.product_id}'" style="cursor:pointer">
          ${item.image ? `<img src="${item.image}" alt="${escapeHtml(item.name)}" loading="lazy">` : '<div class="product-card-img-placeholder"><i class="fas fa-image"></i></div>'}
        </div>
        <div class="product-card-body">
          <p class="product-card-category">${escapeHtml(item.category_name || '')}</p>
          <h3 class="product-card-name" onclick="window.location.href='/pages/product.html?id=${item.product_id}'" style="cursor:pointer">${escapeHtml(item.name)}</h3>
          <div class="product-card-rating">${Stars.render(parseFloat(item.avg_rating || 0))}<span class="rating-count">(${item.review_count || 0})</span></div>
          ${item.stock === 0 ? '<p class="stock-out"><i class="fas fa-times-circle"></i> Out of stock</p>' : ''}
          <div class="product-card-footer">
            <div class="product-card-price">
              ${item.sale_price
                ? `<span class="price-original">${Format.price(item.price)}</span><span class="price-sale price-main">${Format.price(item.sale_price)}</span>`
                : `<span class="price-main">${Format.price(item.price)}</span>`}
            </div>
            <button class="btn btn-sm btn-primary" onclick="Cart.add(${item.product_id})" ${item.stock === 0 ? 'disabled' : ''}>
              <i class="fas fa-shopping-bag"></i>
            </button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle fa-3x" style="color:var(--color-danger)"></i><h3>Failed to load wishlist</h3></div>`;
  }
}

async function removeFromWishlist(wishId, btn) {
  btn.disabled = true;
  try {
    await Api.wishlist.remove(wishId);
    Toast.show('Removed from wishlist.', 'info', 'fas fa-heart-broken');
    await loadWishlist();
  } catch (err) {
    Toast.show(err.message || 'Failed.', 'error');
    btn.disabled = false;
  }
}
window.removeFromWishlist = removeFromWishlist;
</script>
</body>
</html>
