<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>
<header class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-text">Shop<span class="logo-accent">Lux</span></span></a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:var(--spacing-3)">
      <i class="fas fa-lock" style="color:var(--color-success)"></i>
      <span style="font-size:var(--text-sm);font-weight:600;color:var(--text-secondary)">Secure Checkout</span>
    </div>
  </div>
</header>

<main>
  <div class="container checkout-layout">
    <!-- LEFT: Form -->
    <div>
      <!-- Shipping -->
      <div class="checkout-section animate-fade-in-up">
        <h3 class="checkout-section-title"><i class="fas fa-map-marker-alt"></i> Shipping Address</h3>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name <span class="required">*</span></label>
            <input type="text" id="sh_firstname" class="form-input" placeholder="John" />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name <span class="required">*</span></label>
            <input type="text" id="sh_lastname" class="form-input" placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Address <span class="required">*</span></label>
          <input type="text" id="sh_address" class="form-input" placeholder="123 Main Street, Apt 4B" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">City <span class="required">*</span></label>
            <input type="text" id="sh_city" class="form-input" placeholder="Casablanca" />
          </div>
          <div class="form-group">
            <label class="form-label">Postal Code <span class="required">*</span></label>
            <input type="text" id="sh_postal" class="form-input" placeholder="20000" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Country</label>
            <select id="sh_country" class="form-select">
              <option value="Morocco">Morocco</option>
              <option value="France">France</option>
              <option value="United States">United States</option>
              <option value="United Kingdom">United Kingdom</option>
              <option value="Germany">Germany</option>
              <option value="Spain">Spain</option>
              <option value="Canada">Canada</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" id="sh_phone" class="form-input" placeholder="+212 6XX XXX XXX" />
          </div>
        </div>
      </div>

      <!-- Payment (simulated) -->
      <div class="checkout-section animate-fade-in-up" style="animation-delay:.1s">
        <h3 class="checkout-section-title"><i class="fas fa-credit-card"></i> Payment Method</h3>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-3)">
          <label style="display:flex;align-items:center;gap:var(--spacing-3);padding:var(--spacing-4);border:1.5px solid var(--color-primary);border-radius:var(--radius-lg);cursor:pointer;background:rgba(108,99,255,.04)">
            <input type="radio" name="payment" value="card" checked style="accent-color:var(--color-primary)" />
            <i class="fas fa-credit-card" style="color:var(--color-primary)"></i>
            <span style="font-weight:600;font-size:var(--text-sm)">Credit / Debit Card</span>
            <div style="margin-left:auto;display:flex;gap:var(--spacing-2);font-size:1.4rem;color:var(--text-muted)">
              <i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i>
            </div>
          </label>
          <label style="display:flex;align-items:center;gap:var(--spacing-3);padding:var(--spacing-4);border:1.5px solid var(--border-color);border-radius:var(--radius-lg);cursor:pointer">
            <input type="radio" name="payment" value="paypal" style="accent-color:var(--color-primary)" />
            <i class="fab fa-paypal" style="color:#003087"></i>
            <span style="font-weight:600;font-size:var(--text-sm)">PayPal</span>
          </label>
          <label style="display:flex;align-items:center;gap:var(--spacing-3);padding:var(--spacing-4);border:1.5px solid var(--border-color);border-radius:var(--radius-lg);cursor:pointer">
            <input type="radio" name="payment" value="cod" style="accent-color:var(--color-primary)" />
            <i class="fas fa-money-bill-wave" style="color:var(--color-success)"></i>
            <span style="font-weight:600;font-size:var(--text-sm)">Cash on Delivery</span>
          </label>
        </div>

        <!-- Simulated card fields -->
        <div id="cardFields" style="margin-top:var(--spacing-5);display:flex;flex-direction:column;gap:var(--spacing-4)">
          <div class="form-group" style="margin:0">
            <label class="form-label">Card Number</label>
            <div class="input-icon-wrap">
              <i class="fas fa-credit-card"></i>
              <input type="text" class="form-input" placeholder="4242 4242 4242 4242" maxlength="19"
                oninput="this.value=this.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim()" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin:0">
              <label class="form-label">Expiry</label>
              <input type="text" class="form-input" placeholder="MM/YY" maxlength="5"
                oninput="this.value=this.value.replace(/[^0-9\/]/g,'').replace(/^(\d{2})(\d)/,'$1/$2')" />
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">CVV</label>
              <input type="text" class="form-input" placeholder="123" maxlength="4"
                oninput="this.value=this.value.replace(/\D/g,'')" />
            </div>
          </div>
          <p style="font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:center;gap:6px">
            <i class="fas fa-info-circle" style="color:var(--color-info)"></i>
            This is a demo. No real payment is processed.
          </p>
        </div>
      </div>

      <!-- Notes -->
      <div class="checkout-section animate-fade-in-up" style="animation-delay:.2s">
        <h3 class="checkout-section-title"><i class="fas fa-comment-alt"></i> Order Notes (optional)</h3>
        <textarea id="orderNotes" class="form-textarea" placeholder="Special instructions for delivery…"></textarea>
      </div>
    </div>

    <!-- RIGHT: Summary -->
    <div>
      <div class="order-summary">
        <h3 class="summary-title">Order Summary</h3>
        <div id="checkoutItems" style="margin-bottom:var(--spacing-4)">
          <div style="text-align:center;padding:var(--spacing-6)"><div class="spinner"></div></div>
        </div>
        <div class="summary-line"><span>Subtotal</span><span id="sumSubtotal">—</span></div>
        <div class="summary-line"><span>Shipping</span><span id="sumShipping">—</span></div>
        <div class="summary-line"><span>Tax (20%)</span><span id="sumTax">—</span></div>
        <div class="summary-total"><span>Total</span><span id="sumTotal">—</span></div>
        <button class="btn btn-primary btn-full" id="placeOrderBtn" onclick="placeOrder()">
          <i class="fas fa-check-circle"></i> Place Order
        </button>
        <div style="display:flex;align-items:center;justify-content:center;gap:var(--spacing-2);margin-top:var(--spacing-4)">
          <i class="fas fa-shield-alt" style="color:var(--color-success)"></i>
          <span style="font-size:var(--text-xs);color:var(--text-muted)">Protected by 256-bit SSL</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
let cartData = null;

document.addEventListener('DOMContentLoaded', async () => {
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  Auth.init();
  if (!Auth.requireAuth('/pages/checkout.html')) return;

  // Pre-fill user info
  const user = Auth.user;
  if (user) {
    document.getElementById('sh_firstname').value = user.firstname || '';
    document.getElementById('sh_lastname').value  = user.lastname  || '';
  }

  // Payment radio
  document.querySelectorAll('input[name="payment"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('cardFields').style.display = r.value === 'card' ? 'flex' : 'none';
      document.querySelectorAll('label').forEach(l => {
        const inp = l.querySelector('input[type="radio"]');
        if (inp) l.style.borderColor = inp.checked ? 'var(--color-primary)' : 'var(--border-color)';
      });
    });
  });

  await loadCartSummary();
});

async function loadCartSummary() {
  try {
    const res = await Api.cart.get();
    cartData = res.data;
    if (!cartData.items.length) {
      Toast.show('Your cart is empty.', 'warning');
      setTimeout(() => window.location.href = '/', 1500);
      return;
    }
    const container = document.getElementById('checkoutItems');
    container.innerHTML = cartData.items.map(item => `
      <div style="display:flex;align-items:center;gap:var(--spacing-3);margin-bottom:var(--spacing-3);font-size:var(--text-sm)">
        <div style="width:44px;height:44px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;background:var(--bg-tertiary)">
          ${item.image ? `<img src="${item.image}" style="width:100%;height:100%;object-fit:cover">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><i class="fas fa-image" style="color:var(--text-muted);font-size:.7rem"></i></div>'}
        </div>
        <div style="flex:1">
          <p style="font-weight:600;color:var(--text-primary)">${escapeHtml(item.name)}</p>
          <p style="color:var(--text-muted)">Qty: ${item.quantity}</p>
        </div>
        <span style="font-weight:700">${Format.price(item.line_total)}</span>
      </div>`).join('') + '<hr style="border:none;border-top:1px solid var(--border-light);margin:var(--spacing-4) 0">';

    const subtotal = parseFloat(cartData.subtotal);
    const shipping = subtotal > 100 ? 0 : 9.99;
    const tax      = subtotal * 0.20;
    const total    = subtotal + shipping + tax;
    document.getElementById('sumSubtotal').textContent = Format.price(subtotal);
    document.getElementById('sumShipping').textContent = shipping === 0 ? 'FREE' : Format.price(shipping);
    document.getElementById('sumTax').textContent      = Format.price(tax);
    document.getElementById('sumTotal').textContent    = Format.price(total);
  } catch {
    Toast.show('Could not load cart.', 'error');
  }
}

async function placeOrder() {
  const btn = document.getElementById('placeOrderBtn');
  const required = [
    ['sh_firstname', 'First name'],['sh_lastname', 'Last name'],
    ['sh_address',  'Address'],['sh_city','City'],['sh_postal','Postal code']
  ];
  for (const [id, label] of required) {
    if (!document.getElementById(id)?.value.trim()) {
      Toast.show(`${label} is required.`, 'warning');
      document.getElementById(id)?.focus();
      return;
    }
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Processing…';

  const paymentMethod = document.querySelector('input[name="payment"]:checked')?.value || 'card';

  try {
    const res = await Api.orders.create({
      shipping_firstname: document.getElementById('sh_firstname').value.trim(),
      shipping_lastname:  document.getElementById('sh_lastname').value.trim(),
      shipping_address:   document.getElementById('sh_address').value.trim(),
      shipping_city:      document.getElementById('sh_city').value.trim(),
      shipping_postal:    document.getElementById('sh_postal').value.trim(),
      shipping_country:   document.getElementById('sh_country').value,
      shipping_phone:     document.getElementById('sh_phone').value.trim() || null,
      payment_method:     paymentMethod,
      notes:              document.getElementById('orderNotes').value.trim() || null,
    });
    Toast.show('Order placed successfully! 🎉', 'success');
    setTimeout(() => window.location.href = `/pages/orders.html?success=${res.order.order_number}`, 1000);
  } catch (err) {
    Toast.show(err.message || 'Order failed. Please try again.', 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order';
  }
}
</script>
</body>
</html>
