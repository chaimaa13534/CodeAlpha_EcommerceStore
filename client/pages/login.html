<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<main class="auth-page">
  <div class="auth-card animate-scale-in">
    <a href="/" class="auth-logo">Shop<span class="logo-accent">Lux</span></a>
    <p class="auth-subtitle">Welcome back! Sign in to your account.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label">Email <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Password <span class="required">*</span></label>
        <div class="input-icon-wrap" style="position:relative">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-input" placeholder="Your password" required />
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-switch">
      Don't have an account? <a href="/pages/register.html">Create one</a>
    </div>
    <div class="auth-switch" style="margin-top:var(--spacing-2)">
      <a href="/" style="color:var(--text-muted);font-size:var(--text-xs)">← Back to store</a>
    </div>
  </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Apply theme
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);

  Auth.init();
  if (Auth.isLoggedIn) { window.location.href = '/'; return; }

  // Toggle password visibility
  document.getElementById('togglePwd')?.addEventListener('click', () => {
    const inp = document.getElementById('password');
    const icon = document.querySelector('#togglePwd i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    // Clear errors
    document.getElementById('emailError').textContent    = '';
    document.getElementById('passwordError').textContent = '';

    let valid = true;
    if (!email) {
      document.getElementById('emailError').textContent = 'Email is required.';
      document.getElementById('email').classList.add('error'); valid = false;
    }
    if (!password) {
      document.getElementById('passwordError').textContent = 'Password is required.';
      document.getElementById('password').classList.add('error'); valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in…';

    try {
      const res = await Api.auth.login({ email, password });
      Auth.setSession(res.token, res.user);
      Toast.show(`Welcome back, ${res.user.firstname}!`, 'success');
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
      setTimeout(() => window.location.href = redirect, 700);
    } catch (err) {
      Toast.show(err.message || 'Login failed.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  });
});
</script>
</body>
</html>
