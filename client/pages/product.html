<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>
<div id="loader" class="loader-overlay"><div class="loader-content"><div class="loader-logo">ShopLux</div><div class="loader-spinner"></div></div></div>

<!-- Minimal Navbar -->
<header class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-text">Shop<span class="logo-accent">Lux</span></span></a>
    <nav style="display:flex;align-items:center;gap:var(--spacing-4);margin-left:auto">
      <a href="/" class="btn btn-sm btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
      <a href="/pages/cart.html" class="action-btn" style="position:relative">
        <i class="fas fa-shopping-bag"></i>
        <span class="badge" id="cartBadge" style="display:none">0</span>
      </a>
      <button class="action-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </nav>
  </div>
</header>

<main>
  <!-- Breadcrumb -->
  <div style="background:var(--bg-primary);border-bottom:1px solid var(--border-color)">
    <div class="container" style="padding:var(--spacing-3) var(--spacing-6)">
      <nav style="font-size:var(--text-sm);color:var(--text-muted);display:flex;align-items:center;gap:var(--spacing-2)">
        <a href="/" style="color:var(--color-primary)">Home</a>
        <i class="fas fa-chevron-right" style="font-size:10px"></i>
        <span id="breadCategory"></span>
        <i class="fas fa-chevron-right" style="font-size:10px" id="breadSep2"></i>
        <span id="breadName" style="color:var(--text-primary);font-weight:500"></span>
      </nav>
    </div>
  </div>

  <div class="container">
    <div id="productContent"></div>
    <!-- Related products -->
    <div id="relatedSection" class="section" style="padding-top:var(--spacing-12)">
      <div class="section-header"><h2 class="section-title">Related Products</h2></div>
      <div class="products-grid" id="relatedGrid"></div>
    </div>
  </div>
</main>

<!-- Review Modal -->
<div class="modal-overlay" id="reviewOverlay">
  <div class="modal" id="reviewModal">
    <button class="modal-close" id="reviewClose"><i class="fas fa-times"></i></button>
    <div class="modal-header"><h3 class="modal-title">Write a Review</h3></div>
    <div class="modal-body">
      <form id="reviewForm">
        <div class="form-group">
          <label class="form-label">Your Rating <span class="required">*</span></label>
          <div class="stars-input" id="starsInput">
            <button type="button" class="star-btn" data-val="1"><i class="fas fa-star"></i></button>
            <button type="button" class="star-btn" data-val="2"><i class="fas fa-star"></i></button>
            <button type="button" class="star-btn" data-val="3"><i class="fas fa-star"></i></button>
            <button type="button" class="star-btn" data-val="4"><i class="fas fa-star"></i></button>
            <button type="button" class="star-btn" data-val="5"><i class="fas fa-star"></i></button>
          </div>
          <input type="hidden" id="ratingVal" value="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="reviewTitle" class="form-input" placeholder="Summary of your review" />
        </div>
        <div class="form-group">
          <label class="form-label">Comment</label>
          <textarea id="reviewComment" class="form-textarea" placeholder="Share your experience…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="reviewSubmitBtn">
          <i class="fas fa-paper-plane"></i> Submit Review
        </button>
      </form>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:var(--spacing-20)">
  <div class="footer-bottom"><div class="container footer-bottom-inner"><p>&copy; 2026 ShopLux. All rights reserved.</p><div class="payment-badges"><i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i><i class="fab fa-cc-paypal"></i></div></div></div>
</footer>
<button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
let productData = null;
let selectedRating = 0;
let currentQty = 1;
let wishlistId = null;

document.addEventListener('DOMContentLoaded', async () => {
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const c = document.documentElement.getAttribute('data-theme');
    const n = c === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('sl_theme', n);
    document.querySelector('#themeToggle i').className = n === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });

  Auth.init();
  await Cart.refresh();

  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = '/'; return; }

  setTimeout(() => document.getElementById('loader')?.classList.add('hidden'), 500);

  await loadProduct(id);
  bindReviewModal();
  window.addEventListener('scroll', () => {
    document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 10);
    document.getElementById('backToTop')?.classList.toggle('visible', window.scrollY > 400);
  });
  document.getElementById('backToTop')?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
});

async function loadProduct(id) {
  const container = document.getElementById('productContent');
  try {
    const res = await Api.products.get(id);
    productData = res.data;
    document.title = `${productData.name} — ShopLux`;

    // Breadcrumb
    document.getElementById('breadCategory').innerHTML = `<a href="/?category=${productData.category_slug}" style="color:var(--color-primary)">${escapeHtml(productData.category_name || '')}</a>`;
    document.getElementById('breadName').textContent = productData.name;

    // Check wishlist
    if (Auth.isLoggedIn) {
      try {
        const wRes = await Api.wishlist.check(productData.id);
        wishlistId = wRes.inWishlist ? wRes.wishlistId : null;
      } catch {}
    }

    const effectivePrice = productData.sale_price || productData.price;
    const discount = productData.sale_price ? Math.round((1 - productData.sale_price / productData.price) * 100) : 0;
    const inWish = wishlistId !== null;

    container.innerHTML = `
    <div class="product-detail animate-fade-in">
      <!-- Gallery -->
      <div class="product-gallery">
        <div class="gallery-main">
          ${productData.image
            ? `<img src="${productData.image}" alt="${escapeHtml(productData.name)}" id="mainImage">`
            : `<div class="product-card-img-placeholder" style="height:100%;font-size:5rem"><i class="fas fa-image"></i></div>`}
        </div>
      </div>

      <!-- Info -->
      <div class="product-info">
        <p class="product-info-category">${escapeHtml(productData.category_name || '')}</p>
        <h1 class="product-info-title">${escapeHtml(productData.name)}</h1>

        <div class="product-info-rating">
          ${Stars.render(parseFloat(productData.avg_rating || 0))}
          <span class="rating-count">${productData.review_count || 0} review${productData.review_count !== 1 ? 's' : ''}</span>
          ${productData.sold_count > 0 ? `<span style="color:var(--text-muted);font-size:var(--text-xs)">• ${Format.number(productData.sold_count)} sold</span>` : ''}
        </div>

        <div class="product-info-price">
          ${productData.sale_price
            ? `<span class="price-main price-sale">${Format.price(productData.sale_price)}</span>
               <span class="price-original">${Format.price(productData.price)}</span>
               <span class="card-badge badge-sale" style="margin-left:var(--spacing-2)">-${discount}%</span>`
            : `<span class="price-main">${Format.price(productData.price)}</span>`}
        </div>

        <p class="product-info-desc">${escapeHtml(productData.description || 'No description available.')}</p>

        <div class="product-info-stock">
          <div class="stock-dot ${productData.stock === 0 ? 'out' : productData.stock <= 5 ? 'low' : ''}"></div>
          ${productData.stock === 0
            ? '<span style="color:var(--color-danger);font-weight:600">Out of Stock</span>'
            : productData.stock <= 5
            ? `<span style="color:var(--color-warning);font-weight:600">Only ${productData.stock} left in stock!</span>`
            : `<span style="color:var(--color-success);font-weight:600">In Stock</span> <span style="color:var(--text-muted);font-size:var(--text-xs)">(${productData.stock} available)</span>`}
        </div>

        <!-- Quantity -->
        <div style="display:flex;align-items:center;gap:var(--spacing-4)">
          <span style="font-size:var(--text-sm);font-weight:600;color:var(--text-secondary)">Quantity:</span>
          <div class="qty-control">
            <button class="qty-btn" id="qtyMinus" onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
            <input class="qty-input" id="qtyInput" type="number" value="1" min="1" max="${productData.stock}" readonly />
            <button class="qty-btn" id="qtyPlus"  onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
          </div>
        </div>

        <!-- Actions -->
        <div class="product-info-actions">
          <button class="btn btn-primary" id="addToCartBtn"
            onclick="addToCartFull()" ${productData.stock === 0 ? 'disabled' : ''}>
            <i class="fas fa-shopping-bag"></i>
            ${productData.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
          </button>
          <button class="btn ${inWish ? 'btn-danger' : 'btn-outline'}" id="wishlistBtn" onclick="handleWishlist()">
            <i class="fas fa-heart"></i> ${inWish ? 'Saved' : 'Wishlist'}
          </button>
        </div>

        <!-- Shipping info -->
        <div style="border-top:1px solid var(--border-color);padding-top:var(--spacing-5);display:flex;flex-direction:column;gap:var(--spacing-3)">
          <div style="display:flex;align-items:center;gap:var(--spacing-3);font-size:var(--text-sm);color:var(--text-secondary)">
            <i class="fas fa-shipping-fast" style="color:var(--color-success);width:18px"></i>
            <span>Free shipping on orders over $100</span>
          </div>
          <div style="display:flex;align-items:center;gap:var(--spacing-3);font-size:var(--text-sm);color:var(--text-secondary)">
            <i class="fas fa-undo" style="color:var(--color-info);width:18px"></i>
            <span>30-day hassle-free returns</span>
          </div>
          <div style="display:flex;align-items:center;gap:var(--spacing-3);font-size:var(--text-sm);color:var(--text-secondary)">
            <i class="fas fa-shield-alt" style="color:var(--color-primary);width:18px"></i>
            <span>Secure checkout with SSL encryption</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Reviews Section -->
    <div style="margin:var(--spacing-16) 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--spacing-8)">
        <h2 class="section-title">Customer Reviews</h2>
        ${Auth.isLoggedIn ? `<button class="btn btn-outline" onclick="openReviewModal()"><i class="fas fa-pen"></i> Write a Review</button>` : `<a href="/pages/login.html" class="btn btn-outline">Login to Review</a>`}
      </div>

      <!-- Rating summary -->
      <div style="display:flex;align-items:center;gap:var(--spacing-8);padding:var(--spacing-8);background:var(--bg-card);border-radius:var(--radius-xl);border:1px solid var(--border-color);margin-bottom:var(--spacing-6)">
        <div style="text-align:center;flex-shrink:0">
          <div style="font-size:var(--text-6xl);font-weight:800;color:var(--text-primary);line-height:1">${parseFloat(productData.avg_rating || 0).toFixed(1)}</div>
          ${Stars.render(parseFloat(productData.avg_rating || 0))}
          <p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:4px">${productData.review_count || 0} reviews</p>
        </div>
        <div style="flex:1" id="ratingBars"></div>
      </div>

      <div id="reviewsList"></div>
    </div>`;

    renderReviews(productData.reviews || []);
    await loadRelated();
    addToRecentlyViewed(productData.id);

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle fa-3x" style="color:var(--color-danger)"></i><h3>Product not found</h3><p>${err.message || 'This product does not exist.'}</p><a href="/" class="btn btn-primary">Back to Store</a></div>`;
  }
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  const max   = productData?.stock || 1;
  currentQty  = Math.max(1, Math.min(max, currentQty + delta));
  input.value = currentQty;
}

async function addToCartFull() {
  if (!Auth.requireAuth()) return;
  const btn = document.getElementById('addToCartBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Adding…';
  try {
    await Api.cart.add({ product_id: productData.id, quantity: currentQty });
    Cart.refresh();
    Toast.show(`${productData.name} added to cart!`, 'success', 'fas fa-shopping-bag');
  } catch (err) {
    Toast.show(err.message || 'Could not add to cart.', 'error');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-shopping-bag"></i> Add to Cart';
}

async function handleWishlist() {
  if (!Auth.requireAuth()) return;
  const btn = document.getElementById('wishlistBtn');
  try {
    if (wishlistId) {
      await Api.wishlist.remove(wishlistId);
      wishlistId = null;
      btn.className = 'btn btn-outline';
      btn.innerHTML = '<i class="fas fa-heart"></i> Wishlist';
      Toast.show('Removed from wishlist.', 'info', 'fas fa-heart-broken');
    } else {
      await Api.wishlist.add(productData.id);
      const wRes = await Api.wishlist.check(productData.id);
      wishlistId = wRes.wishlistId;
      btn.className = 'btn btn-danger';
      btn.innerHTML = '<i class="fas fa-heart"></i> Saved';
      Toast.show('Added to wishlist!', 'success', 'fas fa-heart');
    }
  } catch (err) {
    Toast.show(err.message || 'Failed.', 'error');
  }
}

function renderReviews(reviews) {
  const container = document.getElementById('reviewsList');
  if (!container) return;
  if (!reviews.length) {
    container.innerHTML = `<div class="empty-state" style="padding:var(--spacing-10)"><i class="fas fa-comment-slash fa-2x"></i><h3>No reviews yet</h3><p>Be the first to review this product!</p></div>`;
    return;
  }
  container.innerHTML = reviews.map(r => `
    <div class="cart-item" style="margin-bottom:var(--spacing-4)">
      <div style="width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center">
        ${r.avatar ? `<img src="${r.avatar}" style="width:100%;height:100%;object-fit:cover">` : `<i class="fas fa-user" style="color:var(--text-muted)"></i>`}
      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:var(--spacing-3);margin-bottom:var(--spacing-1)">
          <span style="font-weight:700;font-size:var(--text-sm)">${escapeHtml(r.firstname)} ${escapeHtml(r.lastname)}</span>
          ${Stars.render(r.rating)}
          <span style="font-size:var(--text-xs);color:var(--text-muted)">${Format.ago(r.created_at)}</span>
        </div>
        ${r.title ? `<p style="font-weight:600;font-size:var(--text-sm);margin-bottom:4px">${escapeHtml(r.title)}</p>` : ''}
        <p style="font-size:var(--text-sm);color:var(--text-secondary)">${escapeHtml(r.comment || '')}</p>
      </div>
    </div>`).join('');
}

async function loadRelated() {
  if (!productData) return;
  try {
    const res = await Api.products.list({ category: productData.category_slug, limit: 4 });
    const grid = document.getElementById('relatedGrid');
    if (!grid) return;
    const filtered = res.data.filter(p => p.id !== productData.id).slice(0, 4);
    if (!filtered.length) { document.getElementById('relatedSection').style.display = 'none'; return; }
    grid.innerHTML = filtered.map(p => ProductCard.render(p)).join('');
  } catch {}
}

function bindReviewModal() {
  const overlay = document.getElementById('reviewOverlay');
  document.getElementById('reviewClose')?.addEventListener('click', () => overlay?.classList.remove('open'));
  overlay?.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  // Stars
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedRating = parseInt(btn.dataset.val);
      document.getElementById('ratingVal').value = selectedRating;
      document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('active', i < selectedRating));
    });
  });

  document.getElementById('reviewForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    if (!Auth.requireAuth()) return;
    if (!selectedRating) { Toast.show('Please select a rating.', 'warning'); return; }
    const btn = document.getElementById('reviewSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Submitting…';
    try {
      await Api.reviews.create({
        product_id: productData.id,
        rating:     selectedRating,
        title:      document.getElementById('reviewTitle').value.trim() || null,
        comment:    document.getElementById('reviewComment').value.trim() || null,
      });
      Toast.show('Review submitted!', 'success');
      document.getElementById('reviewOverlay').classList.remove('open');
      document.getElementById('reviewForm').reset();
      selectedRating = 0;
      document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
      // Reload product
      await loadProduct(productData.id);
    } catch (err) {
      Toast.show(err.message || 'Could not submit review.', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Review';
  });
}

function openReviewModal() {
  if (!Auth.requireAuth()) return;
  document.getElementById('reviewOverlay')?.classList.add('open');
}

function addToRecentlyViewed(id) {
  let recent = JSON.parse(localStorage.getItem('sl_recent') || '[]');
  recent = [id, ...recent.filter(x => x !== id)].slice(0, 10);
  localStorage.setItem('sl_recent', JSON.stringify(recent));
}
</script>
</body>
</html>
