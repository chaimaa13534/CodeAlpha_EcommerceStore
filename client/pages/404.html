<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background: var(--bg-secondary); }
    .error-code { font-size: 8rem; font-weight: 900; color: var(--color-primary); line-height: 1; font-family: var(--font-display); opacity: .15; position: absolute; }
    .error-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 2rem; height: 160px; }
    .error-icon { font-size: 5rem; z-index: 1; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  </style>
</head>
<body>
  <div class="error-wrap">
    <span class="error-code">404</span>
    <span class="error-icon">😕</span>
  </div>
  <h1 style="font-family:var(--font-display);font-size:2.5rem;margin-bottom:1rem">Page Not Found</h1>
  <p style="color:var(--text-secondary);max-width:400px;margin-bottom:2rem;font-size:1.1rem">
    Oops! The page you're looking for has wandered off. Let's get you back to shopping.
  </p>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
    <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Store</a>
    <button onclick="history.back()" class="btn btn-outline btn-lg"><i class="fas fa-arrow-left"></i> Go Back</button>
  </div>
  <script>
    const theme = localStorage.getItem('sl_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
