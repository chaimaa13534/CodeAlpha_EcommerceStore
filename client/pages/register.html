<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<main class="auth-page">
  <div class="auth-card animate-scale-in">
    <a href="/" class="auth-logo">Shop<span class="logo-accent">Lux</span></a>
    <p class="auth-subtitle">Create your free account today.</p>

    <form id="registerForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name <span class="required">*</span></label>
          <input type="text" id="firstname" class="form-input" placeholder="John" required />
          <span class="form-error" id="firstnameError"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name <span class="required">*</span></label>
          <input type="text" id="lastname" class="form-input" placeholder="Doe" required />
          <span class="form-error" id="lastnameError"></span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Username <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-at"></i>
          <input type="text" id="username" class="form-input" placeholder="johndoe" required />
        </div>
        <span class="form-error" id="usernameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Email <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Password <span class="required">*</span></label>
        <div class="input-icon-wrap" style="position:relative">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required />
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div id="strengthBar" style="height:4px;border-radius:2px;margin-top:6px;background:var(--bg-tertiary);overflow:hidden">
          <div id="strengthFill" style="height:100%;width:0;transition:all .3s ease;border-radius:2px"></div>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div class="auth-switch">
      Already have an account? <a href="/pages/login.html">Sign In</a>
    </div>
    <div class="auth-switch" style="margin-top:var(--spacing-2)">
      <a href="/" style="color:var(--text-muted);font-size:var(--text-xs)">← Back to store</a>
    </div>
  </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);

  Auth.init();
  if (Auth.isLoggedIn) { window.location.href = '/'; return; }

  // Password strength
  document.getElementById('password')?.addEventListener('input', (e) => {
    const v = e.target.value;
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^a-zA-Z0-9]/.test(v)) score++;
    const colors = ['', '#EF4444','#F59E0B','#3B82F6','#10B981','#10B981'];
    const widths = ['0%','20%','40%','60%','80%','100%'];
    fill.style.width  = widths[score];
    fill.style.background = colors[score] || '';
  });

  // Toggle password
  document.getElementById('togglePwd')?.addEventListener('click', () => {
    const inp  = document.getElementById('password');
    const icon = document.querySelector('#togglePwd i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
  });

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');

    const fields = ['firstname','lastname','username','email','password'];
    fields.forEach(f => {
      document.getElementById(`${f}Error`).textContent = '';
      document.getElementById(f)?.classList.remove('error');
    });

    const data = {
      firstname: document.getElementById('firstname').value.trim(),
      lastname:  document.getElementById('lastname').value.trim(),
      username:  document.getElementById('username').value.trim(),
      email:     document.getElementById('email').value.trim(),
      password:  document.getElementById('password').value,
    };

    let valid = true;
    if (!data.firstname) { document.getElementById('firstnameError').textContent = 'Required.'; valid = false; }
    if (!data.lastname)  { document.getElementById('lastnameError').textContent  = 'Required.'; valid = false; }
    if (!data.username)  { document.getElementById('usernameError').textContent  = 'Required.'; valid = false; }
    if (!data.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
      document.getElementById('emailError').textContent = 'Valid email required.'; valid = false;
    }
    if (data.password.length < 6) {
      document.getElementById('passwordError').textContent = 'At least 6 characters.'; valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Creating account…';

    try {
      const res = await Api.auth.register(data);
      Auth.setSession(res.token, res.user);
      Toast.show('Account created! Welcome to ShopLux 🎉', 'success');
      setTimeout(() => window.location.href = '/', 800);
    } catch (err) {
      Toast.show(err.message || 'Registration failed.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  });
});
</script>
</body>
</html>
