<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart — ShopLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
<div id="toastContainer" class="toast-container"></div>
<header class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="/" class="navbar-logo"><span class="logo-text">Shop<span class="logo-accent">Lux</span></span></a>
    <nav style="display:flex;align-items:center;gap:var(--spacing-4);margin-left:auto">
      <a href="/" class="btn btn-sm btn-outline"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
      <button class="action-btn theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </nav>
  </div>
</header>

<main class="cart-page">
  <div class="container">
    <h1 style="font-family:var(--font-display);font-size:var(--text-4xl);margin-bottom:var(--spacing-8)">
      Shopping Cart <span id="itemCount" style="font-size:var(--text-xl);color:var(--text-muted);font-family:var(--font-sans)"></span>
    </h1>
    <div class="cart-layout" id="cartLayout">
      <div id="cartItems">
        <div style="text-align:center;padding:var(--spacing-10)"><div class="spinner spinner-lg"></div></div>
      </div>
      <div id="cartSummary" class="order-summary" style="display:none">
        <h3 class="summary-title">Order Summary</h3>
        <div class="summary-line"><span>Subtotal</span><span id="sumSubtotal">$0.00</span></div>
        <div class="summary-line"><span>Shipping</span><span id="sumShipping">Calculated at checkout</span></div>
        <div class="summary-line"><span>Tax (20%)</span><span id="sumTax">$0.00</span></div>
        <div class="summary-total"><span>Total</span><span id="sumTotal">$0.00</span></div>
        <a href="/pages/checkout.html" class="btn btn-primary btn-full" style="margin-bottom:var(--spacing-3)">
          <i class="fas fa-lock"></i> Proceed to Checkout
        </a>
        <button class="btn btn-secondary btn-full" id="clearCartBtn">
          <i class="fas fa-trash"></i> Clear Cart
        </button>
        <p style="font-size:var(--text-xs);color:var(--text-muted);text-align:center;margin-top:var(--spacing-4)">
          <i class="fas fa-shield-alt"></i> Secure checkout — SSL encrypted
        </p>
      </div>
    </div>
  </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ui.js"></script>
<script>
let cartData = null;

document.addEventListener('DOMContentLoaded', async () => {
  const theme = localStorage.getItem('sl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const c = document.documentElement.getAttribute('data-theme');
    const n = c === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('sl_theme', n);
    document.querySelector('#themeToggle i').className = n === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });

  Auth.init();
  if (!Auth.requireAuth('/pages/cart.html')) return;

  await loadCart();
  document.getElementById('clearCartBtn')?.addEventListener('click', clearAll);
});

async function loadCart() {
  try {
    const res = await Api.cart.get();
    cartData = res.data;
    renderCart();
  } catch {
    document.getElementById('cartItems').innerHTML =
      `<div class="empty-state"><i class="fas fa-exclamation-circle fa-3x"></i><h3>Failed to load cart</h3><a href="/" class="btn btn-primary">Back to Store</a></div>`;
  }
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const summary   = document.getElementById('cartSummary');
  const countEl   = document.getElementById('itemCount');

  if (!cartData.items.length) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-shopping-bag fa-4x"></i>
        <h3>Your cart is empty</h3>
        <p>Start shopping and add some products to your cart!</p>
        <a href="/" class="btn btn-primary"><i class="fas fa-store"></i> Browse Products</a>
      </div>`;
    if (summary) summary.style.display = 'none';
    if (countEl) countEl.textContent = '';
    return;
  }

  if (countEl) countEl.textContent = `(${cartData.itemCount} item${cartData.itemCount !== 1 ? 's' : ''})`;

  container.innerHTML = cartData.items.map(item => `
    <div class="cart-item animate-fade-in-up" id="item-${item.id}">
      <div class="cart-item-img" onclick="window.location.href='/pages/product.html?id=${item.product_id}'" style="cursor:pointer">
        ${item.image
          ? `<img src="${item.image}" alt="${escapeHtml(item.name)}">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-tertiary)"><i class="fas fa-image" style="color:var(--text-muted)"></i></div>`}
      </div>
      <div class="cart-item-info">
        <h3 class="cart-item-name" onclick="window.location.href='/pages/product.html?id=${item.product_id}'" style="cursor:pointer">${escapeHtml(item.name)}</h3>
        <p class="cart-item-price">
          ${item.sale_price
            ? `<span class="price-sale">${Format.price(item.sale_price)}</span> <span class="price-original">${Format.price(item.price)}</span>`
            : `<span>${Format.price(item.price)}</span>`} each
        </p>
        <div class="cart-item-controls">
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})"><i class="fas fa-minus"></i></button>
            <input class="qty-input" type="number" value="${item.quantity}" min="1" max="${item.stock}"
              onchange="updateQty(${item.id}, parseInt(this.value))" />
            <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})"><i class="fas fa-plus"></i></button>
          </div>
          <div style="display:flex;align-items:center;gap:var(--spacing-4)">
            <span class="cart-item-total">${Format.price(item.line_total)}</span>
            <button class="cart-item-remove" onclick="removeItem(${item.id})" title="Remove">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`).join('');

  // Summary
  const subtotal = parseFloat(cartData.subtotal);
  const shipping  = subtotal > 100 ? 0 : 9.99;
  const tax       = subtotal * 0.20;
  const total     = subtotal + shipping + tax;

  document.getElementById('sumSubtotal').textContent = Format.price(subtotal);
  document.getElementById('sumShipping').textContent = shipping === 0 ? 'FREE ' : Format.price(shipping);
  document.getElementById('sumTax').textContent      = Format.price(tax);
  document.getElementById('sumTotal').textContent    = Format.price(total);
  if (summary) summary.style.display = 'block';
}

async function updateQty(itemId, qty) {
  if (qty < 1) { removeItem(itemId); return; }
  try {
    await Api.cart.update(itemId, qty);
    await loadCart();
    Cart.refresh();
  } catch (err) {
    Toast.show(err.message || 'Could not update.', 'error');
    await loadCart();
  }
}

async function removeItem(itemId) {
  const el = document.getElementById(`item-${itemId}`);
  if (el) { el.style.opacity = '.4'; el.style.pointerEvents = 'none'; }
  try {
    await Api.cart.remove(itemId);
    await loadCart();
    Cart.refresh();
    Toast.show('Item removed.', 'info');
  } catch (err) {
    Toast.show(err.message || 'Could not remove.', 'error');
    if (el) { el.style.opacity = '1'; el.style.pointerEvents = ''; }
  }
}

async function clearAll() {
  if (!confirm('Clear all items from your cart?')) return;
  try {
    await Api.cart.clear();
    cartData = { items: [], subtotal: '0.00', itemCount: 0 };
    renderCart();
    Cart.refresh();
    Toast.show('Cart cleared.', 'info');
  } catch (err) {
    Toast.show(err.message || 'Failed.', 'error');
  }
}
</script>
</body>
</html>
